<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>즐거운 3학년 7반 알림장</title>
    <style>
        :root {
            --primary: #4CAF50;
            --bg: #ffffff;
            --text: #333333;
            --border: #e0e0e0;
        }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: var(--text);
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background-color: var(--bg);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        header {
            background-color: var(--primary);
            color: white;
            padding: 16px;
            text-align: center;
            position: relative;
        }
        h1 {
            margin: 0;
            font-size: 1.2rem;
        }
        .teacher-btn {
            position: absolute;
            right: 16px;
            top: 14px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 1.5rem;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            line-height: 1;
        }
        .date-section {
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        #displayDate {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .date-picker-wrap {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        input[type="date"] {
            padding: 6px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }
        button {
            padding: 8px 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .section {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }
        .section h3 {
            margin-top: 0;
            color: var(--primary);
            font-size: 1.1rem;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
            padding-bottom: 4px;
        }
        .content-box {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            min-height: 50px;
            white-space: pre-wrap;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            box-sizing: border-box;
        }
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 100;
        }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 8px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .close-btn {
            float: right;
            cursor: pointer;
            font-size: 1.5rem;
        }
        #loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: var(--primary);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>즐거운 3학년 7반 알림장</h1>
        <button class="teacher-btn" onclick="openLoginModal()">+</button>
    </header>

    <div class="date-section">
        <div id="displayDate">날짜를 불러오는 중...</div>
        <div class="date-picker-wrap">
            <input type="date" id="datePicker">
            <button onclick="loadNoticeByDate()">이전 전달사항 조회</button>
        </div>
    </div>

    <div id="loading">데이터를 불러오는 중입니다...</div>

    <div id="mainContent">
        <div class="section">
            <h3>📌 전달사항</h3>
            <div class="content-box" id="noticeContent">전달사항이 없습니다.</div>
        </div>

        <div class="section">
            <h3>📄 출결서류 안내</h3>
            <div class="content-box" id="attendanceContent">해당사항 없음</div>
        </div>

        <div class="section">
            <h3>📝 수행평가 / 숙제 안내</h3>
            <div class="content-box" id="homeworkContent">등록된 내용이 없습니다.</div>
            <!-- 학생들도 내용을 추가할 수 있게 하려면 아래 폼 사용 -->
            <div style="margin-top: 10px; display: flex; gap: 5px;">
                <input type="text" id="studentHomeworkInput" placeholder="새로운 숙제/평가 일정 입력">
                <button onclick="addHomework()" style="white-space: nowrap;">추가</button>
            </div>
        </div>

        <div class="section">
            <h3>📮 익명 건의함</h3>
            <p style="font-size: 0.8rem; color: #666;">내용은 선생님만 볼 수 있습니다.</p>
            <input type="text" id="sugName" placeholder="이름 (익명가능)">
            <textarea id="sugContent" rows="3" placeholder="선생님께 하고 싶은 말이나 건의사항을 적어주세요."></textarea>
            <button onclick="submitSuggestion()" style="width: 100%;">건의사항 보내기</button>
        </div>
    </div>
</div>

<!-- Teacher Login Modal -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModals()">&times;</span>
        <h2>교사 인증</h2>
        <input type="password" id="teacherPwd" placeholder="비밀번호 입력">
        <button onclick="checkPassword()" style="width: 100%;">확인</button>
    </div>
</div>

<!-- Teacher Edit Modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModals()">&times;</span>
        <h2>알림장 작성/수정</h2>
        <input type="date" id="editDate" style="width: 100%; margin-bottom: 10px;">

        <label>전달사항</label>
        <textarea id="editNotice" rows="4"></textarea>

        <label>출결서류 안내 (이름 / 필요서류)</label>
        <textarea id="editAttendance" rows="3"></textarea>

        <label>수행평가 / 숙제 안내</label>
        <textarea id="editHomework" rows="3"></textarea>

        <button onclick="saveNotice()" style="width: 100%;">저장 / 반영하기</button>
    </div>
</div>

<script>
    // ★★★ 여기에 구글 앱스 스크립트 배포 후 얻은 웹앱 URL을 넣으세요 ★★★
    const GAS_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL";

    let currentDateStr = "";

    window.onload = () => {
        // 오늘 날짜로 초기화
        const today = new Date();
        // 한국 시간 기준 YYYY-MM-DD 변환
        const tzOffset = today.getTimezoneOffset() * 60000;
        const localISOTime = (new Date(today - tzOffset)).toISOString().slice(0, 10);

        document.getElementById('datePicker').value = localISOTime;
        loadNoticeByDate();
    };

    function formatDate(dateString) {
        const d = new Date(dateString);
        const days = ['일', '월', '화', '수', '목', '금', '토'];
        return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]}요일)`;
    }

    async function loadNoticeByDate() {
        const selectedDate = document.getElementById('datePicker').value;
        if (!selectedDate) return;

        currentDateStr = selectedDate;
        document.getElementById('displayDate').innerText = formatDate(selectedDate);

        if (GAS_URL === "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL") {
            document.getElementById('noticeContent').innerText = "관리자: 소스코드에서 GAS_URL을 먼저 설정해주세요.";
            return;
        }

        document.getElementById('loading').style.display = 'block';
        document.getElementById('mainContent').style.display = 'none';

        try {
            const response = await fetch(`${GAS_URL}?action=getNotice&date=${selectedDate}`);
            const data = await response.json();

            document.getElementById('noticeContent').innerText = data.notice || "전달사항이 없습니다.";
            document.getElementById('attendanceContent').innerText = data.attendance || "해당사항 없음";
            document.getElementById('homeworkContent').innerText = data.homework || "등록된 내용이 없습니다.";

            // 모달 데이터 미리 채워두기
            document.getElementById('editDate').value = selectedDate;
            document.getElementById('editNotice').value = data.notice || "";
            document.getElementById('editAttendance').value = data.attendance || "";
            document.getElementById('editHomework').value = data.homework || "";

        } catch (error) {
            console.error(error);
            alert("데이터를 불러오는데 실패했습니다.");
        } finally {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        }
    }

    // 학생 숙제 추가 기능
    async function addHomework() {
        const input = document.getElementById('studentHomeworkInput').value;
        if(!input.trim()) return alert("내용을 입력해주세요.");

        const currentHomework = document.getElementById('homeworkContent').innerText;
        const newHomework = (currentHomework === "등록된 내용이 없습니다." ? "" : currentHomework + "\n") + "👉 " + input;

        // 서버 전송용 객체
        const payload = {
            action: 'saveNotice',
            date: currentDateStr,
            notice: document.getElementById('noticeContent').innerText,
            attendance: document.getElementById('attendanceContent').innerText,
            homework: newHomework
        };

        try {
            document.getElementById('studentHomeworkInput').value = "업데이트 중...";
            await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            document.getElementById('homeworkContent').innerText = newHomework;
            document.getElementById('studentHomeworkInput').value = "";
            alert("반영되었습니다.");
        } catch (e) {
            alert("오류가 발생했습니다.");
        }
    }

    // 익명 건의함 제출
    async function submitSuggestion() {
        const name = document.getElementById('sugName').value || "익명";
        const content = document.getElementById('sugContent').value;

        if(!content.trim()) return alert("내용을 입력해주세요.");

        const payload = {
            action: 'saveSuggestion',
            name: name,
            content: content
        };

        try {
            await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            alert("선생님께 건의사항이 전달되었습니다!");
            document.getElementById('sugName').value = "";
            document.getElementById('sugContent').value = "";
        } catch (e) {
            alert("전송 중 오류가 발생했습니다.");
        }
    }

    // 교사 모달 제어
    function openLoginModal() { document.getElementById('loginModal').style.display = 'block'; }
    function closeModals() { 
        document.getElementById('loginModal').style.display = 'none'; 
        document.getElementById('editModal').style.display = 'none';
        document.getElementById('teacherPwd').value = '';
    }

    function checkPassword() {
        const pwd = document.getElementById('teacherPwd').value;
        if(pwd === '7755') {
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('editModal').style.display = 'block';
        } else {
            alert('비밀번호가 틀렸습니다.');
        }
    }

    // 교사 알림장 저장
    async function saveNotice() {
        const payload = {
            action: 'saveNotice',
            date: document.getElementById('editDate').value,
            notice: document.getElementById('editNotice').value,
            attendance: document.getElementById('editAttendance').value,
            homework: document.getElementById('editHomework').value
        };

        try {
            await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            alert("알림장이 성공적으로 저장되었습니다.");
            closeModals();

            // 저장 후 현재 보고 있는 날짜를 수정한 날짜로 변경하고 리로드
            document.getElementById('datePicker').value = payload.date;
            loadNoticeByDate();
        } catch (e) {
            alert("저장 중 오류가 발생했습니다.");
        }
    }
</script>
</body>
</html>
